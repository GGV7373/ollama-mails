services:
  app:
    build: .
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://localhost:11434/api/generate
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
